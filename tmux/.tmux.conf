# prefix 키 C-b -> C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 마우스 지원
set -g mouse on

# 256색 + truecolor 지원. screen-256color는 tmux가 보내는 배경색 쿼리(OSC 11)
# 응답을 못 삼키고 셸로 흘려(^[]11;rgb:...) 화면을 더럽히므로 tmux-256color 사용
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# 히스토리 버퍼 크기
set -g history-limit 50000

# ESC 지연 최소화 (vim/편집기 사용 시 필수). 0이면 SSH에서 터미널 DA 응답이
# 쪼개져 셸로 새므로(^[[>0;10;1c) 10ms로 둠 — vim 체감 영향 없음
set -sg escape-time 10

# 세션 유지 시간 (SSH 끊겨도 세션 유지)
set -g remain-on-exit off

# 인덱스 1부터 시작
set -g base-index 1
setw -g pane-base-index 1

# 상태바 (Solarized Light)
set -g status-style "bg=#eee8d5,fg=#657b83"
# 윈도우 목록을 세션 배지 바로 뒤(왼쪽)에
set -g status-justify left
set -g status-left "#[bg=#2aa198,fg=#fdf6e3,bold] #h #[default] #[bg=#268bd2,fg=#fdf6e3,bold] #S #[default] "
set -g status-left-length 40
set -g status-right "#[fg=#93a1a1]%Y-%m-%d #[fg=#586e75,bold]%H:%M "
set -g status-right-length 60

# 윈도우 탭
setw -g window-status-style "fg=#93a1a1,bg=#eee8d5"
setw -g window-status-current-style "fg=#fdf6e3,bg=#b58900,bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#P:#{pane_current_command} "

# 페인 경계선
set -g pane-border-style "fg=#eee8d5"
set -g pane-active-border-style "fg=#268bd2"

# 명령행 메시지
set -g message-style "bg=#eee8d5,fg=#cb4b16"

# status-left(host/세션 배지) 클릭 시 세션 선택기
bind -n MouseDown1StatusLeft choose-tree -Zs

# 창 분할 단축키 (직관적)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 새 창 열 때 현재 경로 유지
bind c new-window -c "#{pane_current_path}"

# 설정 리로드
bind r source-file ~/.tmux.conf \; display "Config reloaded"
