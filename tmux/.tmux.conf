# prefix 키 C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 마우스 지원
set -g mouse on

# 256색 + truecolor. psmux는 tmux-256color terminfo가 없어 공용으로 screen-256color 사용.
# truecolor는 terminal-overrides Tc로 활성화(WSL tmux에서 동작, psmux는 무시하나 무경고).
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# 히스토리 버퍼 크기
set -g history-limit 50000

# ESC 지연. SSH에선 tmux의 터미널 capability 쿼리(DA/DA2/OSC11 배경색) 응답이
# 쪼개져 도착하는데, escape-time이 짧으면 tmux가 이를 묶어 소비하지 못하고 셸로
# 샌다(^[[>0;10;1c, ^[]11;rgb:...). 3.5에서 기본 10ms로 줄며 재발 → 100ms로 둠.
# 부족하면 500까지 올릴 것. vim 체감 영향은 미미.
set -sg escape-time 100

# 종료 시 페인 자동 종료
set -g remain-on-exit off

# 인덱스 1부터 시작
set -g base-index 1
setw -g pane-base-index 1

# 상태바 — 하드코딩 hex 대신 ANSI named 색으로 터미널 테마(팔레트)에 적응
# 배경은 비활성 페인 경계선과 동일한 white(팔레트 추종)
set -g status-style "bg=white,fg=default"
# 윈도우 목록을 세션 배지 바로 뒤(왼쪽)에
set -g status-justify left
set -g status-left "#[bg=cyan,fg=brightwhite,bold] #h #[default] #[bg=blue,fg=brightwhite,bold] #S #[default] "
set -g status-left-length 40
set -g status-right "#[fg=brightblack]%Y-%m-%d #[fg=default,bold]%H:%M "
set -g status-right-length 60

# 윈도우 탭 — 탭 사이 간격은 separator 한 칸뿐(비활성 포맷에 패딩 없음); 선택 탭은 색 반전
setw -g window-status-style "fg=brightblack,bg=white"
setw -g window-status-current-style "reverse,bold"
setw -g window-status-separator " "
setw -g window-status-format "#I:#W"
setw -g window-status-current-format " #I:#P #W "

# 페인 경계선 — ANSI named라 터미널 팔레트 추종 (비활성 white, 활성 blue)
set -g pane-border-style "fg=white"
set -g pane-active-border-style "fg=blue"

# 명령행 메시지
set -g message-style "bg=default,fg=red"

# status-left(host/세션 배지) 클릭 시 세션 선택기
bind -n MouseDown1StatusLeft choose-tree -Zs

# 창 분할 단축키 (직관적)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 새 창 열 때 현재 경로 유지
bind c new-window -c "#{pane_current_path}"

# 설정 리로드
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# 포커스 이벤트 추적 (포커스 인/아웃 시퀀스를 앱에 전달)
set -g focus-events on

# Claude Code 패스스루 (이미지/escape 시퀀스)
set -g allow-passthrough on

# prefix P: 현재 pane 출력을 로그 파일로 파이핑 토글
bind P pipe-pane -o 'cat >> /tmp/claude-session.log'

# prefix S: 로그 파일을 위쪽 pane에서 vim으로 열기
bind S split-window -b -v -l 70% \
  "vim -R -c 'set nofen is hls ic' -c 'normal G' /tmp/claude-session.log"


# ===========================================
# Plugins
# ===========================================
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-sensible'

# Initialize PPM (keep at the very bottom)
run '~/.psmux/plugins/ppm/ppm.ps1'
